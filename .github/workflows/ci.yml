name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - run: tofu fmt -check -recursive components/
      - run: tofu fmt -check -recursive modules/

  # Auto-discovers the matrices from the working tree so new components and
  # new live entries don't need a workflow edit to start getting their own
  # Validate / Plan check. The validate matrix lists every
  # components/<cloud>/<component>/ directory; the plan matrix lists every
  # live/<cloud>/<account>/<region>/<env>/<component>/terragrunt.hcl. Both
  # use `git ls-files` so .terragrunt-cache/ and other gitignored paths are
  # excluded by construction.
  discover:
    name: Discover Matrices
    runs-on: ubuntu-latest
    outputs:
      validate: ${{ steps.matrices.outputs.validate }}
      plan: ${{ steps.matrices.outputs.plan }}
    steps:
      - uses: actions/checkout@v4
      - id: matrices
        run: |
          validate=$(
            git ls-files components/ \
            | awk -F'/' 'NF >= 3 && $2 != "" && $3 != "" { print $2 "/" $3 }' \
            | sort -u \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({cloud: .[0], component: .[1]})
              '
          )
          plan=$(
            git ls-files live/ \
            | grep '/terragrunt\.hcl$' \
            | jq -R -s -c '
                split("\n")
                | map(select(length > 0))
                | map(split("/"))
                | map({
                    cloud: .[1],
                    account: .[2],
                    region: .[3],
                    env: .[4],
                    component: .[5]
                  })
              '
          )
          echo "validate=$validate" >> "$GITHUB_OUTPUT"
          echo "plan=$plan" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate (${{ matrix.cloud }}/${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: discover
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.validate) }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - name: Init and Validate
        working-directory: components/${{ matrix.cloud }}/${{ matrix.component }}
        run: |
          tofu init -backend=false -input=false
          tofu validate

  tflint:
    name: TFLint (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, gcp, azure]
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest
      - run: tflint --init --config .tflint-${{ matrix.cloud }}.hcl
      - run: tflint --recursive --config "$PWD/.tflint-${{ matrix.cloud }}.hcl" --chdir=components/${{ matrix.cloud }} --minimum-failure-severity=error

  checkov:
    name: Security Scan (${{ matrix.cloud }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cloud: [aws, gcp, azure]
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: components/${{ matrix.cloud }}/
          framework: terraform
          # soft_fail keeps the CI green while findings are still surfaced
          # in the run output and (when enabled) the SARIF upload. Treat
          # checkov as an advisory linter, not a build gate. The platform
          # template intentionally trades portfolio-realistic posture
          # (single-RG isolation, no KMS-managed encryption, public
          # endpoints with IP allowlists) for not-prod-hardened best
          # practice. Toggle to false in a fork that's going to a real
          # regulated cluster.
          soft_fail: true
          skip_check: ${{ matrix.cloud == 'aws' && 'CKV_AWS_144,CKV_AWS_145' || '' }}

  plan:
    name: Plan (${{ matrix.cloud }}/${{ matrix.env }}/${{ matrix.component }})
    needs: [discover, validate]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.plan) }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "0.99.4"

      - name: Configure AWS credentials
        if: matrix.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ matrix.region }}

      - name: Authenticate to GCP
        if: matrix.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Azure Login
        if: matrix.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Plan
        working-directory: live/${{ matrix.cloud }}/${{ matrix.account }}/${{ matrix.region }}/${{ matrix.env }}/${{ matrix.component }}
        run: terragrunt plan -no-color
