name: Destroy

on:
  workflow_dispatch:
    inputs:
      cloud:
        description: "Target cloud"
        required: true
        type: choice
        options:
          - aws
          - gcp
          - azure
      account:
        description: "Target account/project (e.g., workload-dev, workload-staging)"
        required: true
        type: string
        default: "workload-dev"
      region:
        description: "Target region (e.g., us-west-2, us-central1, westus2)"
        required: true
        type: string
        default: "us-west-2"
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
      component:
        description: "Component to destroy (e.g., network, cluster, or 'all')"
        required: true
        type: string
        default: "all"
      confirm:
        description: "Type the environment name to confirm"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Destroy ${{ inputs.cloud }}/${{ inputs.environment }}/${{ inputs.component }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    if: inputs.confirm == inputs.environment
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.11.5"
      - uses: gruntwork-io/terragrunt-action@v3
        with:
          tg_version: "0.99.4"

      - name: Configure AWS credentials
        if: inputs.cloud == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.region }}

      - name: Authenticate to GCP
        if: inputs.cloud == 'gcp'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Azure Login
        if: inputs.cloud == 'azure'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Destroy
        working-directory: live/${{ inputs.cloud }}/${{ inputs.account }}/${{ inputs.region }}/${{ inputs.environment }}
        run: |
          if [ "${{ inputs.component }}" = "all" ]; then
            terragrunt run-all destroy --terragrunt-non-interactive
          else
            cd ${{ inputs.component }}
            terragrunt destroy
          fi
