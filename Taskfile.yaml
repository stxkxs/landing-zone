version: "3"

vars:
  CLOUD: '{{.CLOUD | default "aws"}}'
  ACCOUNT: '{{.ACCOUNT | default "workload-dev"}}'
  REGION: '{{.REGION | default "us-west-2"}}'
  ENVIRONMENT: '{{.ENVIRONMENT | default "dev"}}'
  COMPONENT: '{{.COMPONENT | default "all"}}'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # === Validation ===

  fmt:
    desc: Format all OpenTofu files
    cmds:
      - tofu fmt -recursive components/
      - tofu fmt -recursive modules/

  fmt:check:
    desc: Check formatting without modifying files
    cmds:
      - tofu fmt -check -recursive components/
      - tofu fmt -check -recursive modules/

  validate:
    desc: "Validate all components for CLOUD (default: aws)"
    cmds:
      - |
        for dir in components/{{.CLOUD}}/*/; do
          name=$(basename "$dir")
          echo "Validating {{.CLOUD}}/$name..."
          (cd "$dir" && tofu init -backend=false -input=false > /dev/null 2>&1 && tofu validate) || exit 1
        done
        echo "All {{.CLOUD}} components valid."

  lint:
    desc: "Run tflint on all components for CLOUD (default: aws)"
    cmds:
      - tflint --recursive --config .tflint-{{.CLOUD}}.hcl components/{{.CLOUD}}/

  # === Planning ===

  plan:
    desc: "Plan for CLOUD/ACCOUNT/REGION/ENVIRONMENT/COMPONENT"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd live/{{.CLOUD}}/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}} && terragrunt run-all plan
        else
          cd live/{{.CLOUD}}/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}}/{{.COMPONENT}} && terragrunt plan
        fi

  apply:
    desc: "Apply for CLOUD/ACCOUNT/REGION/ENVIRONMENT/COMPONENT"
    cmds:
      - |
        if [ "{{.COMPONENT}}" = "all" ]; then
          cd live/{{.CLOUD}}/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}} && terragrunt run-all apply
        else
          cd live/{{.CLOUD}}/{{.ACCOUNT}}/{{.REGION}}/{{.ENVIRONMENT}}/{{.COMPONENT}} && terragrunt apply
        fi

  # === Backend ===

  init-backend:
    desc: "Create backend storage for CLOUD"
    cmds:
      - ./scripts/init-backend-{{.CLOUD}}.sh

  # === Help ===

  help:
    desc: Show usage
    cmds:
      - |
        echo ""
        echo "Usage:"
        echo "  task <target> [CLOUD=aws|gcp|azure] [ACCOUNT=workload-dev|workload-staging|workload-prod|management] [REGION=us-west-2] [ENVIRONMENT=dev|staging|production|org] [COMPONENT=network|cluster|all]"
        echo ""
        task --list
